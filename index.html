<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aura Academic — ระบบคำนวณเกรดและคาดการณ์เกียรตินิยม</title>
<meta name="description" content="ระบบจำลองการคำนวณ GPA และคาดการณ์เกียรตินิยม สไตล์ Neumorphism" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  html, body, #root { min-height: 100%; }
  body { font-family: 'IBM Plex Sans Thai', system-ui, -apple-system, sans-serif; margin: 0; }
  .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
  #boot { display:flex; align-items:center; justify-content:center; height:100vh; color:#94A3B8; font-size:14px; background:#0F172A; }
</style>
</head>
<body>
<div id="root"><div id="boot">กำลังโหลด Aura Academic…</div></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo } = React;

// ==========================================
// MOCK DATA & CONSTANTS
// ==========================================
const CURRICULUM_LIMITS = {
  total: 133,
  categories: {
    general: {
      total: 33,
      subcategories: {
        thai: { name: 'กลุ่มวิชาภาษาไทย', min: 3 },
        foreign: { name: 'กลุ่มวิชาภาษาต่างประเทศ', min: 6 },
        science: { name: 'กลุ่มวิชาวิทยาศาสตร์', min: 3 },
        math: { name: 'กลุ่มวิชาคณิตศาสตร์', min: 3 },
        social: { name: 'กลุ่มวิชาสังคมศาสตร์', min: 3 },
        humanities: { name: 'กลุ่มวิชามนุษยศาสตร์', min: 3 },
      }
    },
    core: { total: 27, name: 'กลุ่มวิชาแกน' },
    specialized: {
      total: 67,
      subcategories: {
        compulsory: { name: 'กลุ่มวิชาชีพบังคับ', min: 52 },
        elective: { name: 'กลุ่มวิชาชีพเลือก', min: 15 }
      }
    },
    free: { total: 6, name: 'หมวดเลือกเสรี' }
  }
};

const GRADE_VALUES = {
  'A': 4.0, 'B+': 3.5, 'B': 3.0, 'C+': 2.5, 'C': 2.0, 'D+': 1.5, 'D': 1.0, 'F': 0.0, 'W': null
};

const INITIAL_SUBJECTS = [
  { id: '1', code: 'THA101', name: 'ภาษาไทยเพื่อการสื่อสาร', credits: 3, grade: 'A', category: 'general', subcategory: 'thai', year: 1, semester: '1' },
  { id: '2', code: 'ENG101', name: 'ภาษาอังกฤษพื้นฐาน 1', credits: 3, grade: 'B+', category: 'general', subcategory: 'foreign', year: 1, semester: '1' },
  { id: '3', code: 'MTH101', name: 'แคลคูลัส 1', credits: 3, grade: 'B', category: 'general', subcategory: 'math', year: 1, semester: '1' },
  { id: '4', code: 'SCI101', name: 'ฟิสิกส์ทั่วไป', credits: 3, grade: 'C+', category: 'general', subcategory: 'science', year: 1, semester: '1' },
  { id: '5', code: 'CORE101', name: 'การเขียนโปรแกรมคอมพิวเตอร์พื้นฐาน', credits: 3, grade: 'A', category: 'core', subcategory: '', year: 1, semester: '1' },
  { id: '6', code: 'ENG102', name: 'ภาษาอังกฤษพื้นฐาน 2', credits: 3, grade: 'A', category: 'general', subcategory: 'foreign', year: 1, semester: '2' },
  { id: '7', code: 'HUM101', name: 'อารยธรรมมนุษย์และการคิดสร้างสรรค์', credits: 3, grade: 'A', category: 'general', subcategory: 'humanities', year: 1, semester: '2' },
  { id: '8', code: 'SOC101', name: 'สังคมร่วมสมัยและการเปลี่ยนแปลง', credits: 3, grade: 'B', category: 'general', subcategory: 'social', year: 1, semester: '2' },
  { id: '9', code: 'CORE102', name: 'โครงสร้างข้อมูลและอัลกอริทึม', credits: 3, grade: 'A', category: 'core', subcategory: '', year: 1, semester: '2' },
  { id: '10', code: 'SPEC201', name: 'การพัฒนาเว็บแอปพลิเคชันระดับสูง', credits: 3, grade: 'B+', category: 'specialized', subcategory: 'compulsory', year: 1, semester: '2' },
  { id: '11', code: 'CORE201', name: 'ระบบฐานข้อมูลและการจัดการสารสนเทศ', credits: 3, grade: 'B+', category: 'core', subcategory: '', year: 2, semester: '1' },
  { id: '12', code: 'SPEC202', name: 'การออกแบบซอฟต์แวร์เชิงวัตถุ', credits: 3, grade: 'A', category: 'specialized', subcategory: 'compulsory', year: 2, semester: '1' },
  { id: '13', code: 'SPEC203', name: 'วิศวกรรมความต้องการซอฟต์แวร์', credits: 3, grade: 'A', category: 'specialized', subcategory: 'compulsory', year: 2, semester: '1' },
  { id: '14', code: 'FREE101', name: 'หลักการลงทุนส่วนบุคคล', credits: 3, grade: 'A', category: 'free', subcategory: '', year: 2, semester: '1' },
];

const THEMES = {
  spaceBlue: {
    id: 'spaceBlue', name: 'Deep Space Blue',
    bg: '#0F172A', surface: '#1E293B', primary: '#7083FF', secondary: '#8AA9FF',
    accent: '#FFD166', highlight: '#6EE7FF', text: '#F8FAFC', textMuted: '#94A3B8',
    shadowDark: 'rgba(5, 8, 16, 0.8)', shadowLight: 'rgba(255, 255, 255, 0.04)'
  },
  oceanBreeze: {
    id: 'oceanBreeze', name: 'Ocean Breeze',
    bg: '#E0E7FF', surface: '#EEF2FF', primary: '#4F46E5', secondary: '#6366F1',
    accent: '#D97706', highlight: '#06B6D4', text: '#1E1B4B', textMuted: '#4F46E5',
    shadowDark: 'rgba(165, 180, 252, 0.5)', shadowLight: 'rgba(255, 255, 255, 0.9)'
  },
  mysticAmethyst: {
    id: 'mysticAmethyst', name: 'Mystic Amethyst',
    bg: '#18122B', surface: '#393053', primary: '#C8C9FF', secondary: '#9F7AEA',
    accent: '#FFD166', highlight: '#E2E8F0', text: '#F5F3FF', textMuted: '#A5B4FC',
    shadowDark: 'rgba(0, 0, 0, 0.6)', shadowLight: 'rgba(255, 255, 255, 0.05)'
  },
  minimalWarm: {
    id: 'minimalWarm', name: 'Minimal Warm',
    bg: '#FAF8F5', surface: '#F4EFEA', primary: '#4A5568', secondary: '#718096',
    accent: '#DD6B20', highlight: '#319795', text: '#2D3748', textMuted: '#718096',
    shadowDark: 'rgba(160, 140, 120, 0.25)', shadowLight: 'rgba(255, 255, 255, 0.95)'
  },
  sunsetCyber: {
    id: 'sunsetCyber', name: 'Sunset Cyber',
    bg: '#0F0E17', surface: '#242132', primary: '#FF8906', secondary: '#F25F4C',
    accent: '#E53E3E', highlight: '#90CDF4', text: '#FFFFFE', textMuted: '#A7A9BE',
    shadowDark: 'rgba(0, 0, 0, 0.7)', shadowLight: 'rgba(255, 255, 255, 0.03)'
  }
};

// safe localStorage wrapper (file:// / privacy-mode safe)
const store = {
  get(key) { try { return window.localStorage.getItem(key); } catch (e) { return null; } },
  set(key, val) { try { window.localStorage.setItem(key, val); } catch (e) {} }
};

function App() {
  const [currentTheme, setCurrentTheme] = useState(() => {
    const t = store.get('aura_theme');
    return t && THEMES[t] ? t : 'spaceBlue';
  });
  const theme = THEMES[currentTheme];

  const [subjects, setSubjects] = useState(() => {
    const saved = store.get('aura_subjects');
    try { return saved ? JSON.parse(saved) : INITIAL_SUBJECTS; } catch (e) { return INITIAL_SUBJECTS; }
  });

  const [dbStatus, setDbStatus] = useState('syncing');
  const [userSession] = useState({
    email: 'academic.dreamer@university.edu',
    studentId: '6609612345',
    fullName: 'อัครพล เกียรตินิยมเลิศ'
  });

  const [activeTab, setActiveTab] = useState('dashboard');
  const [showAddModal, setShowAddModal] = useState(false);
  const [editingSubject, setEditingSubject] = useState(null);

  const [formCode, setFormCode] = useState('');
  const [formName, setFormName] = useState('');
  const [formCredits, setFormCredits] = useState(3);
  const [formGrade, setFormGrade] = useState('A');
  const [formCategory, setFormCategory] = useState('general');
  const [formSubcategory, setFormSubcategory] = useState('thai');
  const [formYear, setFormYear] = useState(1);
  const [formSemester, setFormSemester] = useState('1');

  const [hasFGrade, setHasFGrade] = useState(false);
  const [studyExceeded, setStudyExceeded] = useState(false);
  const [repeatedCourse, setRepeatedCourse] = useState(false);

  useEffect(() => { store.set('aura_theme', currentTheme); }, [currentTheme]);

  useEffect(() => {
    store.set('aura_subjects', JSON.stringify(subjects));
    setDbStatus('syncing');
    const timer = setTimeout(() => setDbStatus('connected'), 800);
    return () => clearTimeout(timer);
  }, [subjects]);

  useEffect(() => {
    if (subjects.some(s => s.grade === 'F')) setHasFGrade(true);
  }, [subjects]);

  useEffect(() => {
    if (formCategory === 'general') setFormSubcategory('thai');
    else if (formCategory === 'specialized') setFormSubcategory('compulsory');
    else setFormSubcategory('');
  }, [formCategory]);

  // ==========================================
  // CALCULATIONS ENGINE
  // ==========================================
  const academicCalculations = useMemo(() => {
    let totalEarnedCredits = 0;
    let totalGradePoints = 0;
    let gpaCredits = 0;

    const categoryCredits = {
      general: { total: 0, thai: 0, foreign: 0, science: 0, math: 0, social: 0, humanities: 0 },
      core: { total: 0 },
      specialized: { total: 0, compulsory: 0, elective: 0 },
      free: { total: 0 }
    };

    subjects.forEach(subject => {
      const cred = Number(subject.credits);
      const val = GRADE_VALUES[subject.grade];

      if (subject.grade !== 'W') {
        totalEarnedCredits += cred;

        if (subject.category === 'general') {
          categoryCredits.general.total += cred;
          if (subject.subcategory && categoryCredits.general[subject.subcategory] !== undefined) {
            categoryCredits.general[subject.subcategory] += cred;
          }
        } else if (subject.category === 'core') {
          categoryCredits.core.total += cred;
        } else if (subject.category === 'specialized') {
          categoryCredits.specialized.total += cred;
          if (subject.subcategory && categoryCredits.specialized[subject.subcategory] !== undefined) {
            categoryCredits.specialized[subject.subcategory] += cred;
          }
        } else if (subject.category === 'free') {
          categoryCredits.free.total += cred;
        }

        if (val !== null && val !== undefined) {
          totalGradePoints += (val * cred);
          gpaCredits += cred;
        }
      }
    });

    const gpac = gpaCredits > 0 ? (totalGradePoints / gpaCredits) : 0;

    const termsMap = {};
    subjects.forEach(s => {
      const termKey = `Y${s.year}S${s.semester}`;
      if (!termsMap[termKey]) {
        termsMap[termKey] = { credits: 0, points: 0, gpaCredits: 0, label: `ปี ${s.year} เทอม ${s.semester}` };
      }
      const cred = Number(s.credits);
      const val = GRADE_VALUES[s.grade];
      if (s.grade !== 'W' && val !== null && val !== undefined) {
        termsMap[termKey].points += (val * cred);
        termsMap[termKey].gpaCredits += cred;
      }
      if (s.grade !== 'W') termsMap[termKey].credits += cred;
    });

    const termPerformance = Object.keys(termsMap).sort().map(key => {
      const t = termsMap[key];
      return {
        key,
        label: t.label,
        gpa: t.gpaCredits > 0 ? Number((t.points / t.gpaCredits).toFixed(2)) : 0,
        credits: t.credits
      };
    });

    let honorStatus = 'ไม่มีสิทธิ์';
    let honorMessage = '';
    const hasDisqualifyingFactors = hasFGrade || studyExceeded || repeatedCourse;

    if (gpac >= 3.75) {
      if (hasDisqualifyingFactors) {
        honorStatus = 'ไม่เข้าเกณฑ์เกียรตินิยม';
        honorMessage = 'เนื่องจากไม่ผ่านเงื่อนไขประกอบ (มีวิชา F / จบล่าช้า / หรือเคยลงเรียนซ้ำ)';
      } else {
        honorStatus = 'เกียรตินิยมอันดับ 1';
        honorMessage = 'รักษาเกรดเฉลี่ยสะสมนี้ไว้จนกว่าจะสำเร็จการศึกษา!';
      }
    } else if (gpac >= 3.25) {
      if (hasDisqualifyingFactors) {
        honorStatus = 'ไม่เข้าเกณฑ์เกียรตินิยม';
        honorMessage = 'เนื่องจากไม่ผ่านเงื่อนไขประกอบ (มีวิชา F / จบล่าช้า / หรือเคยลงเรียนซ้ำ)';
      } else {
        honorStatus = 'เกียรตินิยมอันดับ 2';
        honorMessage = 'ยอดเยี่ยมมาก! มีสิทธิ์ได้เกียรตินิยมอันดับ 2 หากรักษาเกณฑ์นี้ไว้';
      }
    } else {
      honorStatus = 'ไม่ได้รับเกียรตินิยม';
      honorMessage = 'เกรดเฉลี่ยสะสมปัจจุบันต่ำกว่าเกณฑ์ขั้นต่ำ 3.25';
    }

    return {
      gpac: Number(gpac.toFixed(4)),
      totalEarnedCredits,
      remainingCredits: Math.max(0, CURRICULUM_LIMITS.total - totalEarnedCredits),
      categoryCredits,
      termPerformance,
      honorStatus,
      honorMessage,
      percentComplete: Math.min(100, Math.round((totalEarnedCredits / CURRICULUM_LIMITS.total) * 100))
    };
  }, [subjects, hasFGrade, studyExceeded, repeatedCourse]);

  // ==========================================
  // ACTIONS HANDLERS
  // ==========================================
  const handleOpenAddModal = () => {
    setEditingSubject(null);
    setFormCode(''); setFormName(''); setFormCredits(3); setFormGrade('A');
    setFormCategory('general'); setFormSubcategory('thai'); setFormYear(1); setFormSemester('1');
    setShowAddModal(true);
  };

  const handleOpenEditModal = (subj) => {
    setEditingSubject(subj);
    setFormCode(subj.code); setFormName(subj.name); setFormCredits(subj.credits);
    setFormGrade(subj.grade); setFormCategory(subj.category);
    setFormSubcategory(subj.subcategory || ''); setFormYear(subj.year); setFormSemester(subj.semester);
    setShowAddModal(true);
  };

  const handleDeleteSubject = (id) => setSubjects(subjects.filter(s => s.id !== id));

  const handleSaveSubject = (e) => {
    e.preventDefault();
    if (!formCode || !formName) return;

    if (editingSubject) {
      setSubjects(subjects.map(s => s.id === editingSubject.id ? {
        ...s,
        code: formCode.toUpperCase(), name: formName, credits: Number(formCredits),
        grade: formGrade, category: formCategory, subcategory: formSubcategory,
        year: Number(formYear), semester: formSemester
      } : s));
    } else {
      setSubjects([...subjects, {
        id: Date.now().toString(),
        code: formCode.toUpperCase(), name: formName, credits: Number(formCredits),
        grade: formGrade, category: formCategory, subcategory: formSubcategory,
        year: Number(formYear), semester: formSemester
      }]);
    }
    setShowAddModal(false);
  };

  const handleResetDemoData = () => {
    setSubjects(INITIAL_SUBJECTS);
    setHasFGrade(false); setStudyExceeded(false); setRepeatedCourse(false);
  };

  const sortedSubjects = useMemo(() => {
    return [...subjects].sort((a, b) => {
      if (a.year !== b.year) return a.year - b.year;
      if (a.semester !== b.semester) return String(a.semester).localeCompare(String(b.semester));
      return a.code.localeCompare(b.code);
    });
  }, [subjects]);

  const dynamicStyles = `
    :root {
      --bg-color: ${theme.bg};
      --surface-color: ${theme.surface};
      --primary-color: ${theme.primary};
      --secondary-color: ${theme.secondary};
      --accent-color: ${theme.accent};
      --highlight-color: ${theme.highlight};
      --text-color: ${theme.text};
      --text-muted: ${theme.textMuted};
      --shadow-dark: ${theme.shadowDark};
      --shadow-light: ${theme.shadowLight};
    }
    .neo-flat {
      background: var(--surface-color);
      box-shadow: 6px 6px 16px var(--shadow-dark), -6px -6px 16px var(--shadow-light);
    }
    .neo-concave {
      background: linear-gradient(145deg, var(--surface-color), var(--bg-color));
      box-shadow: 6px 6px 16px var(--shadow-dark), -6px -6px 16px var(--shadow-light);
    }
    .neo-convex {
      background: linear-gradient(145deg, var(--bg-color), var(--surface-color));
      box-shadow: 6px 6px 16px var(--shadow-dark), -6px -6px 16px var(--shadow-light);
    }
    .neo-pressed {
      background: var(--surface-color);
      box-shadow: inset 4px 4px 10px var(--shadow-dark), inset -4px -4px 10px var(--shadow-light);
    }
    .neo-btn {
      background: var(--surface-color);
      box-shadow: 4px 4px 12px var(--shadow-dark), -4px -4px 12px var(--shadow-light);
      transition: all 0.2s ease;
    }
    .neo-btn:active, .neo-btn-active {
      box-shadow: inset 3px 3px 8px var(--shadow-dark), inset -3px -3px 8px var(--shadow-light);
      transform: translateY(1px);
    }
  `;

  return (
    <div className="min-h-screen py-6 px-4 md:px-8 font-sans transition-colors duration-300" style={{ backgroundColor: theme.bg, color: theme.text }}>
      <style>{dynamicStyles}</style>

      <div className="max-w-6xl mx-auto mb-8">
        <header className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-6">
          <div>
            <div className="flex items-center gap-2 mb-1">
              <span className="text-xs font-semibold uppercase tracking-wider px-2 py-0.5 rounded-full" style={{ backgroundColor: theme.primary + '30', color: theme.primary }}>
                ACADEMIC PORTAL
              </span>
              <div className="flex items-center gap-1.5 text-xs">
                <span className={`w-2.5 h-2.5 rounded-full inline-block ${dbStatus === 'connected' ? 'bg-green-400 animate-pulse' : 'bg-yellow-400 animate-spin'}`} />
                <span style={{ color: theme.textMuted }}>
                  {dbStatus === 'connected' ? 'บันทึกข้อมูลในเครื่องแล้ว (Local Storage)' : 'กำลังบันทึก...'}
                </span>
              </div>
            </div>
            <h1 className="text-3xl md:text-4xl font-extrabold tracking-tight" style={{ textShadow: `0 2px 10px ${theme.shadowDark}` }}>
              Aura <span style={{ color: theme.primary }}>Academic</span>
            </h1>
            <p className="text-sm mt-1" style={{ color: theme.textMuted }}>
              ระบบจำลองการคำนวณและคาดการณ์เกียรตินิยมอัจฉริยะ (สไตล์ Neumorphism)
            </p>
          </div>

          <div className="flex flex-wrap items-center gap-4 w-full md:w-auto">
            <button
              onClick={handleResetDemoData}
              className="neo-btn text-xs font-bold px-3 py-2.5 rounded-xl flex items-center gap-1.5"
              title="ย้อนข้อมูลตัวอย่าง"
            >
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.27 15C20.35 15 19.5 14.5 19 13.7" /></svg>
              คืนค่าข้อมูลเริ่มต้น
            </button>

            <div className="neo-pressed p-1.5 rounded-2xl flex items-center gap-1">
              {Object.keys(THEMES).map((key) => (
                <button
                  key={key}
                  onClick={() => setCurrentTheme(key)}
                  className={`w-8 h-8 rounded-xl transition-all duration-200 flex items-center justify-center ${currentTheme === key ? 'scale-110 shadow-lg' : 'opacity-60'}`}
                  style={{ backgroundColor: THEMES[key].surface, border: currentTheme === key ? `2px solid ${THEMES[key].primary}` : 'none' }}
                  title={THEMES[key].name}
                >
                  <span className="w-3.5 h-3.5 rounded-full" style={{ backgroundColor: THEMES[key].primary }} />
                </button>
              ))}
            </div>
          </div>
        </header>

        {/* User Card */}
        <div className="neo-flat p-5 rounded-3xl mb-8 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
          <div className="flex items-center gap-4">
            <div className="w-14 h-14 rounded-2xl neo-pressed flex items-center justify-center text-2xl">🔮</div>
            <div>
              <h2 className="text-lg font-bold">{userSession.fullName}</h2>
              <p className="text-xs" style={{ color: theme.textMuted }}>รหัสประจำตัว: {userSession.studentId} • หลักสูตรวิทยาศาสตรบัณฑิต (133 หน่วยกิต)</p>
            </div>
          </div>
          <div className="text-right w-full sm:w-auto">
            <span className="text-xs px-3 py-1.5 rounded-xl inline-block neo-pressed font-medium" style={{ color: theme.highlight }}>
              {userSession.email}
            </span>
          </div>
        </div>

        {/* Tabs */}
        <div className="neo-pressed p-2 rounded-2xl flex flex-wrap gap-2 mb-8">
          {[
            { id: 'dashboard', label: 'ภาพรวมบอร์ด (Overview)', icon: '📊' },

                              <text x="15" y={yPos + 4} fill={theme.textMuted} fontSize="10" fontWeight="bold">{yVal.toFixed(1)}</text>
                            </g>
                          );
                        })}

                        {(() => {
                          const pointsCount = academicCalculations.termPerformance.length;
                          const gap = 500 / (pointsCount - 1 || 1);
                          const coords = academicCalculations.termPerformance.map((item, index) => ({
                            x: 60 + index * gap,
                            y: 180 - (item.gpa * 40),
                            label: item.label,
                            gpa: item.gpa
                          }));

                          const pathD = coords.reduce((acc, curr, idx) => idx === 0 ? `M ${curr.x} ${curr.y}` : `${acc} L ${curr.x} ${curr.y}`, '');
                          const areaD = coords.length > 0 ? `${pathD} L ${coords[coords.length - 1].x} 180 L ${coords[0].x} 180 Z` : '';

                          return (
                            <React.Fragment>
                              {areaD && <path d={areaD} fill="url(#chartGradient)" />}
                              {pathD && <path d={pathD} fill="none" stroke={theme.primary} strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" />}
                              {coords.map((c, i) => (
                                <g key={i} className="cursor-pointer">
                                  <circle cx={c.x} cy={c.y} r="6" fill={theme.highlight} stroke={theme.surface} strokeWidth="2" />
                                  <text x={c.x} y={c.y - 12} fill={theme.text} fontSize="11" fontWeight="bold" textAnchor="middle">{c.gpa.toFixed(2)}</text>
                                  <text x={c.x} y="195" fill={theme.textMuted} fontSize="9" textAnchor="middle">{c.label}</text>
                                </g>
                              ))}
                            </React.Fragment>
                          );
                        })()}
                      </svg>
                    </div>
                  </div>
                  <p className="text-center text-[11px] mt-4" style={{ color: theme.textMuted }}>
                    💡 แต่ละโหนดแสดงเกรดเฉลี่ยของเทอมนั้น ๆ ผลสะสมขึ้นอยู่กับรายวิชาที่เพิ่มสะสม
                  </p>
                </div>
              )}
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
              <div className="neo-flat p-6 rounded-3xl space-y-4">
                <h4 className="font-bold text-base">สถิติสัดส่วนหน่วยกิตที่เรียนผ่านแล้ว</h4>
                <div className="space-y-4 pt-2">
                  {[
                    { label: 'หมวดศึกษาทั่วไป', earned: academicCalculations.categoryCredits.general.total, total: CURRICULUM_LIMITS.categories.general.total, color: theme.primary },
                    { label: 'กลุ่มวิชาแกน', earned: academicCalculations.categoryCredits.core.total, total: CURRICULUM_LIMITS.categories.core.total, color: theme.secondary },
                    { label: 'กลุ่มวิชาเฉพาะ', earned: academicCalculations.categoryCredits.specialized.total, total: CURRICULUM_LIMITS.categories.specialized.total, color: theme.highlight },
                    { label: 'หมวดเลือกเสรี', earned: academicCalculations.categoryCredits.free.total, total: CURRICULUM_LIMITS.categories.free.total, color: theme.accent },
                  ].map((cat, i) => {
                    const ratio = Math.min(100, Math.round((cat.earned / cat.total) * 100));
                    return (
                      <div key={i} className="space-y-1">
                        <div className="flex justify-between text-xs font-semibold">
                          <span style={{ color: theme.text }}>{cat.label}</span>
                          <span style={{ color: theme.textMuted }}>{cat.earned} จาก {cat.total} นก. ({ratio}%)</span>
                        </div>
                        <div className="w-full bg-slate-800/30 h-2.5 rounded-full overflow-hidden neo-pressed">
                          <div className="h-2.5 rounded-full transition-all duration-300" style={{ width: `${ratio}%`, backgroundColor: cat.color }} />
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              <div className="neo-flat p-6 rounded-3xl flex flex-col justify-between">
                <div>
                  <h4 className="font-bold text-base mb-3">วิเคราะห์ภาพรวมเพื่อการวางแผนการเรียน</h4>
                  <div className="space-y-3 text-xs leading-relaxed" style={{ color: theme.textMuted }}>
                    <p>📌 ปัจจุบันท่านสะสมหน่วยกิตสำเร็จไปแล้ว <strong className="text-emerald-400 font-extrabold">{academicCalculations.totalEarnedCredits} หน่วยกิต</strong> เหลือหน่วยกิตที่ต้องศึกษาอีกอย่างน้อย <strong className="text-amber-400 font-extrabold">{academicCalculations.remainingCredits} หน่วยกิต</strong></p>
                    <p>📌 หมวดศึกษาทั่วไปมีสัดส่วนกลุ่มวิชาย่อยที่ต้องตรวจสอบอย่างเข้มงวด โดยเฉพาะ <span className="font-bold">กลุ่มวิชาภาษาต่างประเทศ (ขั้นต่ำ 6 นก.)</span> และหมวดหมู่อื่น ๆ ขั้นต่ำ 3 หน่วยกิต</p>
                    <p>📌 การรักษาระดับผลการเรียนเฉลี่ยไม่ให้ต่ำกว่า 3.25 และหลีกเลี่ยงการติด F หรือการลงเรียนซ้ำเป็นกุญแจสำคัญสู่ความสำเร็จการศึกษาระดับเกียรตินิยม</p>
                  </div>
                </div>
                <div className="p-4 rounded-2xl neo-pressed text-center text-xs mt-4">
                  <span className="block font-bold mb-1" style={{ color: theme.highlight }}>
                    {academicCalculations.gpac >= 3.6 ? 'มีแนวโน้มสำเร็จการศึกษาระดับเกียรตินิยมอันดับสูง' : 'พยายามเพิ่มผลการเรียนอีกนิดเพื่ออัปเกรดเกียรตินิยม'}
                  </span>
                  <p className="text-[10px] opacity-75">คำนวณข้อมูลเรียลไทม์ผ่านโครงสร้างหลักสูตร 133 หน่วยกิต</p>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* PREDICT */}
        {activeTab === 'predict' && (
          <div className="space-y-6">
            <div className="neo-flat p-8 rounded-3xl text-center space-y-4">
              <span className="text-5xl block animate-bounce">🏆</span>
              <h3 className="font-black text-2xl">ระบบทำนายผลเกียรตินิยมอัตโนมัติ</h3>
              <p className="text-xs max-w-lg mx-auto" style={{ color: theme.textMuted }}>
                ประเมินโอกาสการคว้าเกียรตินิยมอันดับ 1 และ 2 ของท่านโดยวัดจากกฎเกณฑ์ทางวิชาการและวิเคราะห์เงื่อนไขข้อยกเว้นอย่างเป็นระบบ
              </p>

              <div className="p-6 rounded-2xl max-w-md mx-auto neo-pressed mt-6 space-y-3">
                <span className="text-xs uppercase font-extrabold tracking-widest block" style={{ color: theme.textMuted }}>ผลการจำลอง ณ ปัจจุบัน</span>
                <span className="text-3xl font-black block" style={{ color: academicCalculations.honorStatus.includes('อันดับ') ? theme.primary : '#FF5B5B' }}>
                  {academicCalculations.honorStatus}
                </span>
                <p className="text-xs" style={{ color: theme.textMuted }}>{academicCalculations.honorMessage}</p>
              </div>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div className="neo-flat p-6 rounded-3xl space-y-4">
                <h4 className="font-bold text-base">เช็กพอยต์คะแนนสะสมหลัก</h4>
                <div className="space-y-4 pt-2 text-xs">
                  <div className="flex justify-between items-center gap-3 p-3 rounded-2xl neo-pressed">
                    <div>
                      <span className="font-bold block">GPA สะสม (ปัจจุบัน {academicCalculations.gpac.toFixed(2)})</span>
                      <span style={{ color: theme.textMuted }}>เกณฑ์เกียรตินิยมอันดับ 1 คือ ≥ 3.75, อันดับ 2 คือ ≥ 3.25</span>
                    </div>
                    <span className={`text-base font-bold whitespace-nowrap ${academicCalculations.gpac >= 3.25 ? 'text-green-400' : 'text-red-400'}`}>
                      {academicCalculations.gpac >= 3.25 ? 'ผ่านเกณฑ์เกรด' : 'ตกเกณฑ์เกรด'}
                    </span>
                  </div>

                  <div className="flex justify-between items-center gap-3 p-3 rounded-2xl neo-pressed">
                    <div>
                      <span className="font-bold block">ความสมบูรณ์การลงทะเบียน</span>
                      <span style={{ color: theme.textMuted }}>ลงทะเบียนสำเร็จแล้ว {academicCalculations.totalEarnedCredits} จาก 133 หน่วยกิต</span>
                    </div>
                    <span className="text-xs font-bold whitespace-nowrap" style={{ color: theme.primary }}>สะสม {academicCalculations.percentComplete}%</span>
                  </div>
                </div>
              </div>

              <div className="neo-flat p-6 rounded-3xl space-y-4">
                <h4 className="font-bold text-base">ตรวจสอบเงื่อนไขประพฤติและเวลา</h4>
                <p className="text-xs" style={{ color: theme.textMuted }}>คุณสมบัติเพิ่มเติมเพื่อคงสภาพเกียรตินิยม</p>

                <div className="space-y-3 pt-2 text-xs">
                  <div className="flex justify-between items-center gap-3 p-3 rounded-2xl neo-pressed">
                    <span>ไม่มีผลการเรียนเกรด F</span>
                    <span className={`font-bold whitespace-nowrap ${!hasFGrade ? 'text-green-400' : 'text-red-400'}`}>{!hasFGrade ? 'สมบูรณ์ (ผ่าน)' : 'ตรวจพบวิชา F (ตก)'}</span>
                  </div>
                  <div className="flex justify-between items-center gap-3 p-3 rounded-2xl neo-pressed">
                    <span>ระยะการศึกษาเป็นไปตามเวลาปกติ (4 ปี)</span>
                    <span className={`font-bold whitespace-nowrap ${!studyExceeded ? 'text-green-400' : 'text-red-400'}`}>{!studyExceeded ? 'ในกำหนดเวลา (ผ่าน)' : 'จบล่าช้า (ตก)'}</span>
                  </div>
                  <div className="flex justify-between items-center gap-3 p-3 rounded-2xl neo-pressed">
                    <span>ไม่เคยรีเกรดหรือเรียนซ้ำวิชาที่ผ่านแล้ว</span>
                    <span className={`font-bold whitespace-nowrap ${!repeatedCourse ? 'text-green-400' : 'text-red-400'}`}>{!repeatedCourse ? 'ไม่มีประวัติเรียนซ้ำ (ผ่าน)' : 'มีประวัติเรียนซ้ำ (ตก)'}</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* MODAL */}
      {showAddModal && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm overflow-y-auto">
          <div className="w-full max-w-lg p-6 rounded-3xl neo-flat relative my-8" style={{ backgroundColor: theme.surface, color: theme.text }}>
            <div className="flex justify-between items-center border-b border-slate-700/20 pb-4 mb-4">
              <h3 className="font-extrabold text-lg">{editingSubject ? 'แก้ไขรายวิชาเรียน' : 'เพิ่มรายวิชาเรียนใหม่'}</h3>
              <button onClick={() => setShowAddModal(false)} className="w-8 h-8 rounded-full neo-btn flex items-center justify-center font-bold text-xs">✕</button>
            </div>

            <form onSubmit={handleSaveSubject} className="space-y-4 text-xs md:text-sm">
              <div className="grid grid-cols-2 gap-4">
                <div className="space-y-1">
                  <label className="block font-bold">รหัสวิชา</label>
                  <input type="text" required placeholder="เช่น ENG101" value={formCode} onChange={(e) => setFormCode(e.target.value)}
                    className="w-full p-3 rounded-xl neo-pressed outline-none border border-transparent transition-all"
                    style={{ backgroundColor: theme.surface, color: theme.text }} />
                </div>
                <div className="space-y-1 col-span-1">
                  <label className="block font-bold">ชื่อวิชา</label>
                  <input type="text" required placeholder="ภาษาอังกฤษพื้นฐาน" value={formName} onChange={(e) => setFormName(e.target.value)}
                    className="w-full p-3 rounded-xl neo-pressed outline-none border border-transparent transition-all"
                    style={{ backgroundColor: theme.surface, color: theme.text }} />
                </div>
              </div>

              <div className="grid grid-cols-3 gap-4">
                <div className="space-y-1">
                  <label className="block font-bold">หน่วยกิต</label>
                  <select value={formCredits} onChange={(e) => setFormCredits(Number(e.target.value))} className="w-full p-3 rounded-xl neo-pressed outline-none cursor-pointer" style={{ backgroundColor: theme.surface, color: theme.text }}>
                    {[1, 2, 3, 4, 6].map(c => <option key={c} value={c}>{c} หน่วยกิต</option>)}
                  </select>
                </div>
                <div className="space-y-1">
                  <label className="block font-bold">เกรดที่ได้</label>
                  <select value={formGrade} onChange={(e) => setFormGrade(e.target.value)} className="w-full p-3 rounded-xl neo-pressed outline-none cursor-pointer font-bold" style={{ backgroundColor: theme.surface, color: theme.text }}>
                    {Object.keys(GRADE_VALUES).map(g => <option key={g} value={g}>{g}</option>)}
                  </select>
                </div>
                <div className="space-y-1">
                  <label className="block font-bold">ปีการศึกษา</label>
                  <select value={formYear} onChange={(e) => setFormYear(Number(e.target.value))} className="w-full p-3 rounded-xl neo-pressed outline-none cursor-pointer" style={{ backgroundColor: theme.surface, color: theme.text }}>
                    {[1, 2, 3, 4, 5, 6, 7, 8].map(y => <option key={y} value={y}>ปี {y}</option>)}
                  </select>
                </div>
              </div>

              <div className="grid grid-cols-2 gap-4">
                <div className="space-y-1">
                  <label className="block font-bold">หมวดหมู่วิชาหลัก</label>
                  <select value={formCategory} onChange={(e) => setFormCategory(e.target.value)} className="w-full p-3 rounded-xl neo-pressed outline-none cursor-pointer" style={{ backgroundColor: theme.surface, color: theme.text }}>
                    <option value="general">หมวดศึกษาทั่วไป (Gen-Ed)</option>
                    <option value="core">กลุ่มวิชาแกน</option>
                    <option value="specialized">กลุ่มวิชาเฉพาะ</option>
                    <option value="free">หมวดเลือกเสรี</option>
                  </select>
                </div>

                {formCategory === 'general' && (
                  <div className="space-y-1">
                    <label className="block font-bold">กลุ่มรายวิชาย่อย (ศึกษาทั่วไป)</label>
                    <select value={formSubcategory} onChange={(e) => setFormSubcategory(e.target.value)} className="w-full p-3 rounded-xl neo-pressed outline-none cursor-pointer" style={{ backgroundColor: theme.surface, color: theme.text }}>
                      <option value="thai">กลุ่มวิชาภาษาไทย</option>
                      <option value="foreign">กลุ่มวิชาภาษาต่างประเทศ</option>
                      <option value="science">กลุ่มวิชาวิทยาศาสตร์</option>
                      <option value="math">กลุ่มวิชาคณิตศาสตร์</option>
                      <option value="social">กลุ่มวิชาสังคมศาสตร์</option>
                      <option value="humanities">กลุ่มวิชามนุษยศาสตร์</option>
                    </select>
                  </div>
                )}

                {formCategory === 'specialized' && (
                  <div className="space-y-1">
                    <label className="block font-bold">กลุ่มวิชาย่อย (วิชาเฉพาะ)</label>
                    <select value={formSubcategory} onChange={(e) => setFormSubcategory(e.target.value)} className="w-full p-3 rounded-xl neo-pressed outline-none cursor-pointer" style={{ backgroundColor: theme.surface, color: theme.text }}>
                      <option value="compulsory">กลุ่มวิชาชีพบังคับ</option>
                      <option value="elective">กลุ่มวิชาชีพเลือก</option>
                    </select>
                  </div>
                )}

                {formCategory !== 'general' && formCategory !== 'specialized' && (
                  <div className="space-y-1 opacity-40">
                    <label className="block font-bold">กลุ่มวิชาย่อย</label>
                    <input disabled value="ไม่ต้องระบุกลุ่มย่อย" className="w-full p-3 rounded-xl neo-pressed outline-none" style={{ backgroundColor: theme.surface, color: theme.textMuted }} />
                  </div>
                )}
              </div>

              <div className="grid grid-cols-2 gap-4">
                <div className="space-y-1">
                  <label className="block font-bold">ภาคการศึกษา</label>
                  <select value={formSemester} onChange={(e) => setFormSemester(e.target.value)} className="w-full p-3 rounded-xl neo-pressed outline-none cursor-pointer" style={{ backgroundColor: theme.surface, color: theme.text }}>
                    <option value="1">ภาคเรียนที่ 1</option>
                    <option value="2">ภาคเรียนที่ 2</option>
                    <option value="Summer">ภาคเรียนพิเศษ (Summer)</option>
                  </select>
                </div>
              </div>

              <div className="flex gap-4 pt-4 border-t border-slate-700/20">
                <button type="button" onClick={() => setShowAddModal(false)} className="flex-1 py-3 rounded-xl neo-btn font-bold text-center">ยกเลิก</button>
                <button type="submit" className="flex-1 py-3 rounded-xl neo-btn font-bold text-center" style={{ color: theme.primary }}>
                  {editingSubject ? 'บันทึกการแก้ไข' : 'เพิ่มวิชาลงทะเบียน'}
                </button>
              </div>
            </form>
          </div>
        </div>
      )}

      <footer className="max-w-6xl mx-auto mt-12 pt-6 border-t border-slate-700/20 text-center text-xs opacity-60">
        <p>© 2026 Aura Academic Portal. All Rights Reserved. ออกแบบภายใต้กฎบัตรการศึกษาและ Neumorphic Soft UI Design System</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
